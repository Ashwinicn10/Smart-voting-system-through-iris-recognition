{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Admin Dashboard</h2>

    <div class="row">
        <!-- Total Voters Card -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Registered Voters</h5>
                    <p class="display-4 text-primary">{{ total_voters }}</p>
                </div>
            </div>
        </div>

        <!-- Total Candidates Card -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Candidates</h5>
                    <p class="display-4 text-success">{{ total_candidates }}</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Extra Analytics -->
    <div class="row">
        <div class="col-md-12">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body">
                    <h5 class="card-title">Analytics Overview</h5>
                    <p class="text-muted">You can add charts/graphs here (like voter distribution, candidate votes, etc.).</p>
                    <div class="text-center">
                        <i class="bi bi-bar-chart-fill" style="font-size: 3rem; color: gray;"></i>
                        <p class="mt-2">Charts Coming Soon...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

{% endblock %}
