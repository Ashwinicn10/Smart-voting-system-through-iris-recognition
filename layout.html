<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title if title else "BioVote - Iris Voting System" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
    }
    .sidebar {
      width: 240px;
      background: #fff;
      padding: 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }
    .sidebar h2 {
      font-weight: 600;
      font-size: 1.4rem;
      margin-bottom: 30px;
      color: #2575fc;
    }
    .sidebar a {
      display: block;
      padding: 12px 15px;
      border-radius: 8px;
      color: #333;
      margin-bottom: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #2575fc;
      color: #fff;
    }
    .content {
      flex: 1;
      padding: 40px;
      color: #fff;
    }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .btn-custom {
      background: #2575fc;
      color: #fff;
      border-radius: 30px;
      padding: 10px 20px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #6a11cb;
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>BioVote</h2>
    <a href="{{ url_for('home') }}" class="{% if title=='Home' %}active{% endif %}">Home</a>
    <a href="{{ url_for('about') }}" class="{% if title=='About' %}active{% endif %}">About</a>
    <a href="{{ url_for('register') }}" class="{% if title=='Register' %}active{% endif %}">Register</a>
    <a href="{{ url_for('vote') }}" class="{% if title=='Vote' %}active{% endif %}">Vote</a>
    <a href="{{ url_for('admin') }}" class="{% if title=='Admin' %}active{% endif %}">Admin</a>
  </div>

  <!-- Page Content -->
  <div class="content">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
