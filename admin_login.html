{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 90vh;">

  <div class="w-100 px-4" style="max-width: 420px;">

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card shadow-lg p-4 rounded-4 border-0" style="background: #ffffffee;">
      <h3 class="text-center mb-4 fw-bold text-dark">Admin Login</h3>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" class="form-control form-control-lg" name="username" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control form-control-lg" name="password" placeholder="Enter password" required>
        </div>

        <button class="btn btn-dark w-100 py-2 mt-3 fw-bold" style="border-radius: 10px;">
          Login
        </button>
      </form>
    </div>

  </div>

</div>

{% endblock %}
