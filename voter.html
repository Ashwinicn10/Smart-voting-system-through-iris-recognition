{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2 class="mb-4 text-center fw-bold">Welcome, {{ voter.name }}! 🗳️</h2>

  <div class="card p-4 shadow-sm">
    <h5>Select Candidate:</h5>
    <form method="POST">
      {% for candidate in candidates %}
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="candidate_id" value="{{ candidate.id }}" required>
          <label class="form-check-label">{{ candidate.name }}</label>
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-success mt-3">Cast Vote</button>
    </form>
  </div>
</div>
{% endblock %}
